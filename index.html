<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng Quản lý Chi tiêu Nâng cấp</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 400px;
        }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        .thong-tin-vi {
            background: #34495e;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #27ae60; }
        .danh-sach { margin-top: 25px; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 5px; color: #7f8c8d; }
        
        .khoan-chi {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .chi-tiet-ten {
            display: flex;
            flex-direction: column;
        }
        .nhãn-danh-muc {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 2px;
        }
        .tien-thu { color: #2ecc71; font-weight: bold; }
        .tien-chi { color: #e74c3c; font-weight: bold; }
        
        .loading {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Quản Lý Thu Chi</h2>
        
        <div class="thong-tin-vi">
            Số dư: <span id="so-du">0</span> đ
        </div>

        <div class="form-group">
            <label for="loai-giao-dich">Loại giao dịch:</label>
            <select id="loai-giao-dich">
                <option value="chi">Chi tiêu (Khoản ra)</option>
                <option value="thu">Thu nhập (Khoản vào)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ten-khoan-chi">Tên giao dịch:</label>
            <input type="text" id="ten-khoan-chi" placeholder="Ví dụ: Tiền lương, Mua cafe...">
        </div>

        <div class="form-group">
            <label for="danh-muc-giao-dich">Danh mục:</label>
            <select id="danh-muc-giao-dich">
                <option value="An uống">🍔 Ăn uống</option>
                <option value="Di chuyển">🚗 Di chuyển</option>
                <option value="Mua sắm">🛍️ Mua sắm</option>
                <option value="Hóa đơn">💵 Hóa đơn & Tiện ích</option>
                <option value="Giải trí">🎬 Giải trí & Cà phê</option>
                <option value="Thu nhập">💰 Khoản thu nhập</option>
                <option value="Khác">✨ Khác</option>
            </select>
        </div>

        <div class="form-group">
            <label for="so-tien">Số tiền (đ):</label>
            <input type="number" id="so-tien" placeholder="Ví dụ: 50000">
        </div>

        <button id="nut-them">Cập nhật ví</button>

        <div class="danh-sach">
            <h3>Lịch sử dòng tiền</h3>
            <div id="lich-su">
                <div class="loading">Đang đồng bộ với đám mây Firebase...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbIbeVQeht5hsIYE6IXFrRJaOq2oyMMKw",
            authDomain: "quanlychitieu-af553.firebaseapp.com",
            projectId: "quanlychitieu-af553",
            storageBucket: "quanlychitieu-af553.firebasestorage.app",
            messagingSenderId: "800322270032",
            appId: "1:800322270032:web:87fdc66a1e7ac0c4d37255",
            measurementId: "G-3NQYVR3VFB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const boChonBoSuuTap = collection(db, "giao_dich_business");

        const idNutThem = document.getElementById('nut-them');
        const idLoaiGiaoDich = document.getElementById('loai-giao-dich');
        const idTen = document.getElementById('ten-khoan-chi');
        const idDanhMuc = document.getElementById('danh-muc-giao-dich');
        const idSoTien = document.getElementById('so-tien');
        const idHienThiSoDu = document.getElementById('so-du');
        const idVungLichSu = document.getElementById('lich-su');

        // Tự động đổi danh mục gợi ý khi chọn Thu hoặc Chi
        idLoaiGiaoDich.addEventListener('change', function() {
            if (idLoaiGiaoDich.value === 'thu') {
                idDanhMuc.value = 'Thu nhập';
            } else {
                idDanhMuc.value = 'An uống';
            }
        });

        const truyVanSapXep = query(boChonBoSuuTap, orderBy("thoiGian", "desc"));
        
        onSnapshot(truyVanSapXep, function(snapshot) {
            idVungLichSu.innerHTML = ''; 
            let tongSoDu = 0;

            if (snapshot.empty) {
                idVungLichSu.innerHTML = '<div class="loading">Chưa có dữ liệu. Ví của bạn đang trống!</div>';
                idHienThiSoDu.innerText = "0";
                return;
            }

            snapshot.forEach(function(doc) {
                const giaoDich = doc.data();
                let kyTuDau = '';
                let lopMauSac = '';

                if (giaoDich.loai === 'thu') {
                    tongSoDu = tongSoDu + giaoDich.soTien;
                    kyTuDau = '+';
                    lopMauSac = 'tien-thu';
                } else {
                    tongSoDu = tongSoDu - giaoDich.soTien;
                    kyTuDau = '-';
                    lopMauSac = 'tien-chi';
                }

                // Đọc thông tin danh mục, nếu các bản ghi cũ chưa có trường này thì mặc định hiển thị "Khác"
                const hienThiDanhMuc = giaoDich.danhMuc ? giaoDich.danhMuc : "Khác";

                const dongMoi = document.createElement('div');
                dongMoi.classList.add('khoan-chi');
                dongMoi.innerHTML = `
                    <div class="chi-tiet-ten">
                        <span>${giaoDich.ten}</span>
                        <span class="nhãn-danh-muc">📂 ${hienThiDanhMuc}</span>
                    </div>
                    <span class="${lopMauSac}">${kyTuDau}${giaoDich.soTien.toLocaleString('vi-VN')} đ</span>
                `;
                idVungLichSu.appendChild(dongMoi); 
            });

            idHienThiSoDu.innerText = tongSoDu.toLocaleString('vi-VN');
        });

        idNutThem.addEventListener('click', async function() {
            const loai = idLoaiGiaoDich.value; 
            const ten = idTen.value.trim();
            const danhMuc = idDanhMuc.value;
            const soTien = parseInt(idSoTien.value);

            if (ten === '' || isNaN(soTien) || soTien <= 0) {
                alert('Vui lòng nhập đầy đủ thông tin hợp lệ!');
                return;
            }

            try {
                await addDoc(boChonBoSuuTap, {
                    ten: ten,
                    soTien: soTien,
                    loai: loai,
                    danhMuc: danhMuc, // Đẩy danh mục đã chọn lên đám mây
                    thoiGian: Date.now()
                });

                idTen.value = '';
                idSoTien.value = '';
            } catch (loi) {
                console.error("Lỗi đồng bộ dữ liệu: ", loi);
                alert("Đã xảy ra lỗi khi kết nối với máy chủ!");
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chi Tiêu Nội Bộ</title>
    
    <style>
        /* ==========================================================================
           I. CẤU HÌNH BIẾN MÀU SẮC (Dễ dàng thay đổi giao diện tại đây)
           ========================================================================== */
        :root {
            --mau-nen-chinh: #f4f6f9;
            --mau-trang: #ffffff;
            --mau-chu-toi: #2c3e50;
            --mau-chu-nhat: #7f8c8d;
            --border-bo-goc: 12px;
            
            /* Màu sắc trạng thái hành động */
            --mau-dang-nhap: #2ecc71;  /* Xanh lá */
            --mau-dang-ky: #3498db;    /* Xanh dương */
            --mau-dang-xuat: #e74c3c;  /* Đỏ */
            --mau-thu-tien: #2ecc71;
            --mau-chi-tien: #e74c3c;
        }

        /* ==========================================================================
           II. CSS CHO KHUNG ĐĂNG NHẬP / ĐĂNG KÝ (AUTH WINDOW)
           ========================================================================== */
        #man-hinh-auth {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--mau-nen-chinh); z-index: 99999; 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hop-dang-nhap {
            background: var(--mau-trang); padding: 35px 25px; 
            border-radius: var(--border-bo-goc);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 90%; max-width: 380px; text-align: center;
        }
        .hop-dang-nhap h2 { margin: 0 0 10px 0; color: var(--mau-chu-toi); font-size: 24px; }
        .hop-dang-nhap p { margin: 0 0 25px 0; color: var(--mau-chu-nhat); font-size: 14px; }
        
        .o-nhap-lieu {
            width: 100%; padding: 12px 15px; margin-bottom: 15px; 
            border: 1px solid #e0e0e0; border-radius: 8px; 
            box-sizing: border-box; font-size: 15px; outline: none;
            transition: border 0.2s;
        }
        .o-nhap-lieu:focus { border-color: var(--mau-dang-ky); }
        
        .cum-nut-bam { display: flex; gap: 12px; margin-top: 10px; }
        .nut-bam {
            flex: 1; padding: 13px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold; cursor: pointer; 
            color: white; transition: opacity 0.2s;
        }
        .nut-bam:hover { opacity: 0.9; }
        .nut-dang-nhap { background-color: var(--mau-dang-nhap); }
        .nut-dang-ky { background-color: var(--mau-dang-ky); }

        /* ==========================================================================
           III. CSS NÚT ĐĂNG XUẤT NỔI (FLOATING LOGOUT BUTTON)
           ========================================================================== */
        #nut-dang-xuat-he-thong {
            position: fixed; top: 15px; right: 15px; z-index: 9998;
            background-color: var(--mau-dang-xuat); color: white;
            border: none; padding: 8px 16px; border-radius: 20px;
            font-weight: bold; font-size: 13px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); display: none;
        }
    </style>
</head>
<body>

    <div id="man-hinh-auth">
        <div class="hop-dang-nhap">
            <h2>Quản Lý Chi Tiêu</h2>
            <p>Đăng nhập tài khoản hoặc đăng ký để sử dụng</p>
            
            <input type="text" id="auth-username" class="o-nhap-lieu" placeholder="Tên đăng nhập / Username">
            <input type="password" id="auth-password" class="o-nhap-lieu" placeholder="Mật khẩu / Password">
            
            <div class="cum-nut-bam">
                <button id="btn-dang-nhap" class="nut-bam nut-dang-nhap">Đăng Nhập</button>
                <button id="btn-dang-ky" class="nut-bam nut-dang-ky">Đăng Ký</button>
            </div>
        </div>
    </div>

    <button id="nut-dang-xuat-he-thong">🔒 Đăng xuất</button>


    <div id="khung-app-cu-cua-ban" style="padding-top: 60px;">
         <h1 style="text-align: center;">Giao diện quản lý chi tiêu của bạn</h1>
    </div>



    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, deleteDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình kết nối Firebase Firestore
        const firebaseConfig = {
            apiKey: "AIzaSyAbIbeVQeht5hsIYE6IXFrRJaOq2oyMMKw",
            authDomain: "quanlychitieu-af553.firebaseapp.com",
            projectId: "quanlychitieu-af553",
            storageBucket: "quanlychitieu-af553.firebasestorage.app",
            messagingSenderId: "800322270032",
            appId: "1:800322270032:web:87fdc66a1e7ac0c4d37255",
            measurementId: "G-3NQYVR3VFB"
        };        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const boChonGiaoDich = collection(db, "giao_dich_business");
        const boChonUser = collection(db, "danh_sach_user");

        // Quản lý trạng thái phiên đăng nhập
        window.userHienTai = localStorage.getItem("user_dang_nhap") || null;
        window.laAdmin = localStorage.getItem("user_la_admin") === "true";

        // Định danh các thành phần DOM Auth
        const mhAuth = document.getElementById('man-hinh-auth');
        const txtUser = document.getElementById('auth-username');
        const txtPass = document.getElementById('auth-password');
        const btnLogin = document.getElementById('btn-dang-nhap');
        const btnRegister = document.getElementById('btn-dang-ky');
        const btnLogout = document.getElementById('nut-dang-xuat-he-thong');
        
        // Định danh khung bọc App cũ của bạn
        const khungAppCu = document.getElementById('khung-app-cu-cua-ban');

        // Định danh các nút xử lý của app cũ (Sẽ tự kiểm tra tránh lỗi null nếu bạn chưa dán code HTML cũ)
        const idNutGhiDe = document.getElementById('nut-ghi-de');
        const idLoaiGiaoDich = document.getElementById('loai-giao-dich');
        const idTen = document.getElementById('ten-khoan-chi');
        const idDanhMuc = document.getElementById('danh-muc-giao-dich');
        const idSoTien = document.getElementById('so-tien');
        const idVungLichSu = document.getElementById('lich-su-giao-dich');
        const idHienThiSoDu = document.getElementById('so-du');
        const idBcThu = document.getElementById('bao-cao-thu');
        const idBcChi = document.getElementById('bao-cao-chi');

        let huyLangNgheRealtime = null;

        // --- Kiểm tra quyền truy cập đầu trang ---
        kiemTraPhienLamViec();

        function kiemTraPhienLamViec() {
            if (window.userHienTai) {
                mhAuth.style.display = 'none';
                btnLogout.style.display = 'block';
                if(khungAppCu) khungAppCu.style.display = 'block';
                kichHoatBoLocDuLieuRealtime();
            } else {
                mhAuth.style.display = 'flex';
                btnLogout.style.display = 'none';
                if(khungAppCu) khungAppCu.style.display = 'none';
                if (huyLangNgheRealtime) huyLangNgheRealtime();
            }
        }

        // --- Sự kiện Xử lý ĐĂNG KÝ ---
        btnRegister.addEventListener('click', async () => {
            const u = txtUser.value.trim().toLowerCase();
            const p = txtPass.value.trim();
            if (!u || !p) { alert("Vui lòng điền tài khoản & mật khẩu hợp lệ!"); return; }

            const qCheck = query(boChonUser, where("username", "==", u));
            const snapCheck = await getDocs(qCheck);
            if (!snapCheck.empty) { alert("Tên đăng nhập này đã có người sử dụng!"); return; }

            try {
                await addDoc(boChonUser, { username: u, password: p, daDuyet: false, laAdmin: false });
                alert("Đăng ký thành công! Vui lòng chờ Admin duyệt tài khoản để đăng nhập.");
                txtUser.value = ''; txtPass.value = '';
            } catch (err) { alert("Lỗi kết nối Firebase khi đăng ký."); }
        });

        // --- Sự kiện Xử lý ĐĂNG NHẬP ---
        btnLogin.addEventListener('click', async () => {
            const u = txtUser.value.trim().toLowerCase();
            const p = txtPass.value.trim();
            if (!u || !p) { alert("Vui lòng nhập tài khoản!"); return; }

            // Tài khoản admin hệ thống cố định
            if (u === "admin" && p === "admin123") {
                luuPhienDangNhap("admin", true);
                alert("Đăng nhập quyền Quản Trị Viên thành công!"); return;
            }

            const qLogin = query(boChonUser, where("username", "==", u), where("password", "==", p));
            const snapLogin = await getDocs(qLogin);

            if (snapLogin.empty) { alert("Sai tên đăng nhập hoặc mật khẩu!"); return; }

            const thongTinU = snapLogin.docs[0].data();
            if (!thongTinU.daDuyet && !thongTinU.laAdmin) { alert("Tài khoản của bạn chưa được phê duyệt."); return; }

            luuPhienDangNhap(thongTinU.username, thongTinU.laAdmin);
        });

        function luuPhienDangNhap(user, admin) {
            window.userHienTai = user; window.laAdmin = admin;
            localStorage.setItem("user_dang_nhap", user);
            localStorage.setItem("user_la_admin", admin);
            kiemTraPhienLamViec();
        }

        // --- Sự kiện Xử lý ĐĂNG XUẤT ---
        btnLogout.addEventListener('click', () => {
            localStorage.removeItem("user_dang_nhap"); localStorage.removeItem("user_la_admin");
            window.userHienTai = null; window.laAdmin = false;
            kiemTraPhienLamViec();
        });

        // --- LẮNG NGHE & TỰ ĐỘNG LỌC DỮ LIỆU ---
        function kichHoatBoLocDuLieuRealtime() {
            if (huyLangNgheRealtime) huyLangNgheRealtime();

            // Nếu là admin thì thấy hết, nếu là user thường chỉ thấy dữ liệu của chính mình
            let truyVanLoc = window.laAdmin 
                ? query(boChonGiaoDich, orderBy("thoiGian", "desc")) 
                : query(boChonGiaoDich, where("nguoiDung", "==", window.userHienTai), orderBy("thoiGian", "desc"));

            huyLangNgheRealtime = onSnapshot(truyVanLoc, (snapshot) => {
                if (!idVungLichSu) return; // Nếu chưa dán HTML cũ thì bỏ qua không lỗi script
                idVungLichSu.innerHTML = '';
                let tongSoDu = 0, thu = 0, chi = 0;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.loai === 'thu') { tongSoDu += data.soTien; thu += data.soTien; } 
                    else { tongSoDu -= data.soTien; chi += data.soTien; }

                    // Đoạn này tự render danh sách giao dịch tương tự như app cũ của bạn
                    const item = document.createElement('div');
                    item.className = 'dong-giao-dich';
                    item.innerHTML = `
                        <div class="giao-dich-noi-dung" data-id="${doc.id}">
                            <div>
                                <b>${data.ten}</b> <br>
                                <small>${data.danhMuc} | ${data.thoiGian}</small>
                                ${window.laAdmin ? `<br><small style="color:blue">👤 User: ${data.nguoiDung}</small>` : ''}
                            </div>
                            <div style="color: ${data.loai === 'thu' ? 'green':'red'}">
                                ${data.loai === 'thu'?'+':'-'}${data.soTien.toLocaleString()} đ
                            </div>
                        </div>
                    `;
                    idVungLichSu.appendChild(item);
                });

                if (idHienThiSoDu) idHienThiSoDu.innerText = tongSoDu.toLocaleString();
                if (idBcThu) idBcThu.innerText = thu.toLocaleString() + " đ";
                if (idBcChi) idBcChi.innerText = chi.toLocaleString() + " đ";
            });
        }

        // --- XỬ LÝ LƯU GIAO DỊCH MỚI (TỰ GẮN USER ĐANG ĐĂNG NHẬP) ---
        if (idNutGhiDe) {
            idNutGhiDe.addEventListener('click', async () => {
                if (!window.userHienTai) return;
                const loai = idLoaiGiaoDich.value; const ten = idTen.value.trim();
                const danhMuc = idDanhMuc.value; const soTien = parseInt(idSoTien.value);
                const ngay = document.getElementById('ngay-giao-dich')?.value || "";
                const gio = document.getElementById('gio-giao-dich')?.value || "";

                if (!ten || isNaN(soTien) || soTien <= 0) { alert("Dữ liệu không hợp lệ!"); return; }

                try {
                    await addDoc(boChonGiaoDich, {
                        ten: ten, soTien: soTien, loai: loai, danhMuc: danhMuc,
                        thoiGian: `${ngay} ${gio}`.trim(),
                        nguoiDung: window.userHienTai // <-- Khóa phân loại lọc dữ liệu
                    });
                    idTen.value = ''; idSoTien.value = '';
                } catch (e) { console.error(e); }
            });
        }
    </script>
</body>
</html>
